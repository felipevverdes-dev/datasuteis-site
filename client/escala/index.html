    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-E9198198D5", { send_page_view: false });
      const loadThirdPartyScript = (src, attributes = {}) => {
        const script = document.createElement("script");
        script.src = src;
        script.async = true;
        Object.entries(attributes).forEach(([key, value]) =>
          script.setAttribute(key, value)
        );
        document.head.appendChild(script);
      };
      const scheduleThirdPartyScript = (callback, timeout) => {
        if ("requestIdleCallback" in window) {
          window.requestIdleCallback(callback, { timeout });
          return;
        }
        if (document.readyState === "complete") {
          window.setTimeout(callback, 1);
          return;
        }
        window.addEventListener("load", callback, { once: true });
      };
      scheduleThirdPartyScript(
        () =>
          loadThirdPartyScript(
            "https://www.googletagmanager.com/gtag/js?id=G-E9198198D5"
          ),
        2500
      );
      scheduleThirdPartyScript(
        () =>
          loadThirdPartyScript(
            "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3377250238500968",
            { crossorigin: "anonymous" }
          ),
