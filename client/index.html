    <script>
      const COOKIE_CONSENT_KEY = "datasuteis_cookie_consent_v1";
      const GA_MEASUREMENT_ID = "G-E9198198D5";
      const isProductionHost = [
        "datasuteis.com.br",
        "www.datasuteis.com.br",
      ].includes(window.location.hostname);
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      const loadThirdPartyScript = (src, attributes = {}) => {
        const script = document.createElement("script");
        script.src = src;
        script.async = true;
        Object.entries(attributes).forEach(([key, value]) =>
          script.setAttribute(key, value)
        );
        document.head.appendChild(script);
      };
      const scheduleThirdPartyScript = (callback, timeout) => {
        if ("requestIdleCallback" in window) {
          window.requestIdleCallback(callback, { timeout });
          return;
        }
        if (document.readyState === "complete") {
          window.setTimeout(callback, 1);
          return;
        }
        window.addEventListener("load", callback, { once: true });
      };
      let thirdPartyLoaded = false;
      const resumeAdRequests = () => {
        try {
          (adsbygoogle = window.adsbygoogle || []).pauseAdRequests = 0;
        } catch (error) {}
      };
      const loadConsentBasedScripts = () => {
        if (!isProductionHost) {
          return;
        }
        resumeAdRequests();
        if (thirdPartyLoaded) {
          return;
        }
        thirdPartyLoaded = true;
        gtag("js", new Date());
        gtag("config", GA_MEASUREMENT_ID, { send_page_view: false });
        scheduleThirdPartyScript(
          () =>
            loadThirdPartyScript(
              `https://www.googletagmanager.com/gtag/js?id=${GA_MEASUREMENT_ID}`
            ),
          2500
        );
      };
      const readConsent = () => {
        try {
          return localStorage.getItem(COOKIE_CONSENT_KEY);
        } catch (error) {
          return null;
        }
      };
      if (readConsent() === "accepted") {
        loadConsentBasedScripts();
      }
      window.addEventListener("datasuteis-consent-updated", event => {
        if (event.detail?.status === "accepted") {
          loadConsentBasedScripts();
        }
      });
    </script>
